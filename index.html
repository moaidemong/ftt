<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FFT Epicycle Drawing (Three.js)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #111; color: #ddd; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #ui {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.15);
      padding: 10px 12px; border-radius: 10px; backdrop-filter: blur(6px);
      display: flex; flex-direction: column; gap: 8px; min-width: 340px;
    }
    #ui .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #ui label { font-size: 12px; opacity: .9; min-width: 52px; }
    #ui input[type="range"] { width: 220px; }
    #ui small { opacity: .75; line-height: 1.35; }
    #ui .pill { border: 1px solid rgba(255,255,255,.2); padding: 4px 8px; border-radius: 999px; font-size: 12px; }
    #ui button { cursor: pointer; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <div id="ui">
    <div class="row">
      <input id="file" type="file" accept=".svg,image/svg+xml" />
      <button id="demo">Demo SVG</button>
      <span class="pill" id="status">ready</span>
    </div>

    <div class="row">
      <label>Samples</label>
      <input id="samples" type="range" min="256" max="4096" step="256" value="2048" />
      <span id="samplesVal">2048</span>
    </div>

    <div class="row">
      <label>Circles</label>
      <!-- step=1 로 변경 (자동 증가 요구사항) -->
      <input id="circles" type="range" min="10" max="800" step="1" value="250" />
      <span id="circlesVal">250</span>
    </div>

    <div class="row">
      <label>Speed</label>
      <input id="speed" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
      <span id="speedVal">1.0</span>
    </div>

    <div class="row">
      <label>Scale</label>
      <input id="scale" type="range" min="0.2" max="3.0" step="0.05" value="1.0" />
      <span id="scaleVal">1.0</span>
    </div>

    <div class="row">
      <button id="restart">Restart</button>
      <button id="pause">Pause</button>
      <button id="clear">Clear Trail</button>
      <button id="autofit">Auto Fit</button>
    </div>

    <div class="row">
      <button id="lock">Disable Sliders</button>
      <button id="autorun">Auto Run: ON</button>
    </div>

    <small>
      기본 동작: Circle 10 → 800까지 1씩 증가, 각 Circle마다 1회 드로잉(한 바퀴) 완료 후 trail을 옅게 고정(ghost).<br/>
      SVG 좌표계(Y down) → Three.js(Y up) 보정 포함.
    </small>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';

    // -----------------------
    // Three.js 기본 세팅
    // -----------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    let camera = makeOrthoCamera();
    function makeOrthoCamera() {
      const w = window.innerWidth, h = window.innerHeight;
      const aspect = w / h;
      const view = 400; // world units
      const cam = new THREE.OrthographicCamera(
        -view * aspect, view * aspect, view, -view, -2000, 2000
      );
      cam.position.set(0, 0, 10);
      cam.lookAt(0, 0, 0);
      return cam;
    }

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera = makeOrthoCamera();
      // 리사이즈 시에도 fit을 원하면 여기서 autoFit() 호출해도 됨
    });

    const statusEl = document.getElementById('status');
    const setStatus = (t) => statusEl.textContent = t;

    // -----------------------
    // UI
    // -----------------------
    const fileEl = document.getElementById('file');
    const samplesEl = document.getElementById('samples');
    const circlesEl = document.getElementById('circles');
    const speedEl = document.getElementById('speed');
    const scaleEl = document.getElementById('scale');

    const samplesVal = document.getElementById('samplesVal');
    const circlesVal = document.getElementById('circlesVal');
    const speedVal = document.getElementById('speedVal');
    const scaleVal = document.getElementById('scaleVal');

    const lockBtn = document.getElementById('lock');
    const autorunBtn = document.getElementById('autorun');

    const sliderEls = [samplesEl, circlesEl, speedEl, scaleEl];

    samplesEl.addEventListener('input', () => samplesVal.textContent = samplesEl.value);
    circlesEl.addEventListener('input', () => circlesVal.textContent = circlesEl.value);
    speedEl.addEventListener('input', () => speedVal.textContent = speedEl.value);
    scaleEl.addEventListener('input', () => scaleVal.textContent = scaleEl.value);

    document.getElementById('restart').addEventListener('click', () => restart());
    document.getElementById('pause').addEventListener('click', () => togglePause());
    document.getElementById('clear').addEventListener('click', () => clearTrail(true));
    document.getElementById('autofit').addEventListener('click', () => autoFit());
    document.getElementById('demo').addEventListener('click', () => loadDemoSVG());

    lockBtn.addEventListener('click', () => {
      const nowDisabled = !samplesEl.disabled; // 토글
      setSlidersEnabled(!nowDisabled);
    });

    autorunBtn.addEventListener('click', () => {
      autoRun.enabled = !autoRun.enabled;
      autorunBtn.textContent = autoRun.enabled ? 'Auto Run: ON' : 'Auto Run: OFF';
      setStatus(autoRun.enabled ? 'auto' : 'manual');
      // auto를 끄면 circles 슬라이더로 수동 조절할 수 있게 하는게 자연스러움
      if (!autoRun.enabled) setSlidersEnabled(true);
    });

    function setSlidersEnabled(enabled) {
      for (const el of sliderEls) el.disabled = !enabled;
      lockBtn.textContent = enabled ? 'Disable Sliders' : 'Enable Sliders';
    }

    fileEl.addEventListener('change', async (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      const text = await f.text();
      await loadFromSvgText(text);
    });

    // -----------------------
    // 데이터 구조
    // -----------------------
    let comps = [];
    let baseSamples = []; // AutoFit 계산용 (현재 로드된 샘플 점들)
    let nCircles = 250;
    let t = 0;            // [0,1)
    let paused = false;

    // -----------------------
    // Auto Run 정책 (요구사항 3)
    // -----------------------
    const autoRun = {
      enabled: true,
      start: 10,
      max: 800,
      step: 1,
      ghostOpacity: 0.18,    // 드로잉 완료 후 trail을 옅게
      currentTrailOpacity: 0.95,
      isRunning: false
    };

    // -----------------------
    // 렌더 오브젝트들
    // -----------------------
    const group = new THREE.Group();
    scene.add(group);

    let armsLine = null;
    let circlesLines = null;

    // 현재 그리는 trail
    let trailLine = null;
    let trailPoints = [];
    const TRAIL_MAX = 6000;

    // ghost(이전 완료 trail)들을 담아두는 그룹
    const ghostsGroup = new THREE.Group();
    group.add(ghostsGroup);

    function clearSceneDrawables() {
      // ghostsGroup은 유지하되, 그 안은 필요 시 비움
      while (group.children.length) group.remove(group.children[0]);
      group.add(ghostsGroup);

      armsLine = null;
      circlesLines = null;
      trailLine = null;
      trailPoints = [];
    }

    function clearGhosts() {
      while (ghostsGroup.children.length) {
        const obj = ghostsGroup.children.pop();
        obj.geometry?.dispose?.();
        obj.material?.dispose?.();
      }
    }

    function clearTrail(clearGhostToo = false) {
      trailPoints = [];
      if (trailLine) {
        trailLine.geometry.dispose();
        trailLine.material.dispose();
        group.remove(trailLine);
        trailLine = null;
      }
      if (clearGhostToo) clearGhosts();
    }

    function togglePause() {
      paused = !paused;
      document.getElementById('pause').textContent = paused ? 'Resume' : 'Pause';
    }

    function restart() {
      t = 0;
      clearTrail(false);

      if (autoRun.enabled) {
        // 자동 실행 시작 조건
        circlesEl.value = String(autoRun.start);
        circlesVal.textContent = circlesEl.value;

        // AutoRun 중에는 circles 조작 막는게 자연스러움(필요 시 여기서만 disable)
        // 전체 슬라이더 disable도 옵션이지만, 요구사항 2 때문에 버튼으로 제어 가능하게 유지.
        // 기본은 AutoRun 중 sliders disable
        setSlidersEnabled(false);
        autoRun.isRunning = true;
        setStatus('auto');
      } else {
        setSlidersEnabled(true);
        autoRun.isRunning = false;
        setStatus('manual');
      }
    }

    // -----------------------
    // 수학 유틸 (DFT)
    // -----------------------
    function dftComplex(samples) {
      const N = samples.length;
      const out = new Array(N);

      for (let k = 0; k < N; k++) {
        let re = 0, im = 0;
        for (let n = 0; n < N; n++) {
          const phi = (2 * Math.PI * k * n) / N;
          const x = samples[n].x;
          const y = samples[n].y;

          // (x + i y) * (cos(phi) - i sin(phi))
          re += x * Math.cos(phi) + y * Math.sin(phi);
          im += -x * Math.sin(phi) + y * Math.cos(phi);
        }
        re /= N; im /= N;

        const freq = (k <= N / 2) ? k : (k - N);
        const amp = Math.hypot(re, im);
        const phase = Math.atan2(im, re);
        out[k] = { freq, re, im, amp, phase };
      }

      out.sort((a, b) => b.amp - a.amp);
      return out;
    }

    function epicycleTip(tNorm) {
      const use = comps.slice(0, nCircles);
      let x = 0, y = 0;
      const joints = [{ x, y }];

      for (const c of use) {
        const angle = 2 * Math.PI * c.freq * tNorm + c.phase;
        x += c.amp * Math.cos(angle);
        y += c.amp * Math.sin(angle);
        joints.push({ x, y });
      }
      return { tip: { x, y }, joints };
    }

    // -----------------------
    // SVG -> 점 샘플링
    // -----------------------
    function samplePointsFromSVG(svgText, targetN) {
      const loader = new SVGLoader();
      const data = loader.parse(svgText);

      const points = [];
      for (const p of data.paths) {
        const shapes = SVGLoader.createShapes(p);
        for (const s of shapes) {
          const pts = s.getPoints(200);
          for (const v of pts) points.push({ x: v.x, y: v.y });
        }
      }
      if (points.length < 4) throw new Error("SVG에서 충분한 점을 추출하지 못했습니다.");

      // targetN개로 리샘플(균일 인덱스)
      const res = [];
      for (let i = 0; i < targetN; i++) {
        const idx = Math.floor((i / targetN) * points.length);
        res.push({ x: points[idx].x, y: points[idx].y });
      }

      // bbox
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const p of res) {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
      }
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const size = Math.max(maxX - minX, maxY - minY) || 1;

      // ---- (오류 1) 뒤집힘 보정 ----
      // SVG 좌표계는 Y가 아래로 증가, Three는 Y가 위로 증가 → Y축 반전이 기본 보정
      // "180도 뒤집힘"처럼 보이면 보통 이 Y축 보정이 빠졌을 때 발생.
      // (만약 네 SVG에서 좌우까지 반전돼야 하면 아래 mirrorX를 true로 바꾸면 180회전(-x,-y) 효과)
      const flipY = true;
      const mirrorX = false; // 필요 시 true로 바꾸면 x까지 반전(=180도 회전 느낌)

      // world 스케일 기본값 (너무 커 보이면 여기 300을 200으로 낮춰도 됨. AutoFit이 최종적으로 맞춰줌)
      const scale = 300 / size;

      for (const p of res) {
        let x = (p.x - cx) * scale;
        let y = (p.y - cy) * scale;

        if (flipY) y = -y;
        if (mirrorX) x = -x;

        p.x = x;
        p.y = y;
      }
      return res;
    }

    // -----------------------
    // 라인 생성/업데이트
    // -----------------------
    function makeLine(points3, material) {
      const geom = new THREE.BufferGeometry().setFromPoints(points3);
      return new THREE.Line(geom, material);
    }

    function updateArmsAndCircles(joints) {
      const armPts = joints.map(p => new THREE.Vector3(p.x, p.y, 0));
      if (!armsLine) {
        const mat = new THREE.LineBasicMaterial({ color: 0xdddddd, transparent: true, opacity: 0.85 });
        armsLine = makeLine(armPts, mat);
        group.add(armsLine);
      } else {
        armsLine.geometry.dispose();
        armsLine.geometry = new THREE.BufferGeometry().setFromPoints(armPts);
      }

      // circles
      const circlePts = [];
      const SEG = 50;
      for (let i = 0; i < joints.length - 1; i++) {
        const cx = joints[i].x, cy = joints[i].y;
        const nx = joints[i + 1].x, ny = joints[i + 1].y;
        const r = Math.hypot(nx - cx, ny - cy);

        for (let s = 0; s <= SEG; s++) {
          const th = (2 * Math.PI * s) / SEG;
          circlePts.push(new THREE.Vector3(cx + r * Math.cos(th), cy + r * Math.sin(th), 0));
        }
        // 끊김
        circlePts.push(new THREE.Vector3(1e9, 1e9, 0));
      }

      const filtered = circlePts.filter(v => Math.abs(v.x) < 1e8 && Math.abs(v.y) < 1e8);
      if (!circlesLines) {
        const mat = new THREE.LineBasicMaterial({ color: 0x666666, transparent: true, opacity: 0.65 });
        circlesLines = makeLine(filtered, mat);
        group.add(circlesLines);
      } else {
        circlesLines.geometry.dispose();
        circlesLines.geometry = new THREE.BufferGeometry().setFromPoints(filtered);
      }
    }

    function ensureTrailLine() {
      if (trailLine) return;

      const mat = new THREE.LineBasicMaterial({
        color: 0x4aa3ff,
        transparent: true,
        opacity: autoRun.currentTrailOpacity
      });
      trailLine = makeLine(trailPoints.map(p => new THREE.Vector3(p.x, p.y, 0)), mat);
      group.add(trailLine);
    }

    function pushTrailPoint(p) {
      trailPoints.push({ x: p.x, y: p.y });
      if (trailPoints.length > TRAIL_MAX) trailPoints.shift();

      ensureTrailLine();
      const pts3 = trailPoints.map(v => new THREE.Vector3(v.x, v.y, 0));
      trailLine.geometry.dispose();
      trailLine.geometry = new THREE.BufferGeometry().setFromPoints(pts3);
    }

    // -----------------------
    // Auto Fit
    // -----------------------
    function computeBBox(points) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of points) {
        if (!Number.isFinite(p.x) || !Number.isFinite(p.y)) continue;
        minX = Math.min(minX, p.x);
        minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x);
        maxY = Math.max(maxY, p.y);
      }
      return { minX, minY, maxX, maxY, w: (maxX - minX), h: (maxY - minY) };
    }

    function autoFit(padding = 1.15) {
      if (!baseSamples || baseSamples.length < 2) return;

      const bbox = computeBBox(baseSamples);
      if (!(bbox.w > 0) || !(bbox.h > 0)) return;

      const viewW = (camera.right - camera.left);
      const viewH = (camera.top - camera.bottom);

      const s = Math.min(viewW / (bbox.w * padding), viewH / (bbox.h * padding));
      const clamped = Math.max(parseFloat(scaleEl.min), Math.min(parseFloat(scaleEl.max), s));

      scaleEl.value = clamped.toFixed(2);
      scaleVal.textContent = scaleEl.value;
      group.scale.setScalar(parseFloat(scaleEl.value));
    }

    // -----------------------
    // 드로잉 완료 처리: trail을 ghost로 옮기고 옅게 표시
    // -----------------------
    function finalizeCurrentTrailAsGhost() {
      if (!trailLine) return;

      // 현재 trailLine을 group에서 빼서 ghostsGroup에 넣고, material을 옅게 바꿈
      group.remove(trailLine);

      // material/geometry 복사(현재 것을 그대로 ghost로 사용)
      trailLine.material.opacity = autoRun.ghostOpacity;
      trailLine.material.color.setHex(0xaaaaaa);
      trailLine.material.needsUpdate = true;

      ghostsGroup.add(trailLine);
      trailLine = null; // 다음 드로잉을 위해 새 trail을 만들게 함
      trailPoints = [];
    }

    // -----------------------
    // 로딩/계산
    // -----------------------
    async function loadFromSvgText(svgText) {
      try {
        setStatus('loading');
        clearSceneDrawables();
        clearGhosts();
        clearTrail(false);

        const N = parseInt(samplesEl.value, 10);
        const samples = samplePointsFromSVG(svgText, N);
        baseSamples = samples;

        comps = dftComplex(samples);

        // 초기 상태 세팅
        autoFit();
        restart();

        setStatus(autoRun.enabled ? 'auto' : 'manual');
      } catch (err) {
        console.error(err);
        setStatus('error');
        alert(String(err?.message || err));
      }
    }

    async function loadDemoSVG() {
      const demo = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100">
        <path d="M0,-10 C-20,-35 -50,-5 0,40 C50,-5 20,-35 0,-10 Z" fill="none" stroke="black"/>
      </svg>`;
      await loadFromSvgText(demo);
    }

    // -----------------------
    // 애니메이션 루프
    // -----------------------
    let last = performance.now();
    let prevT = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;

      // scale은 항상 반영 (슬라이더가 disable이어도 값은 유지됨)
      const uiScale = parseFloat(scaleEl.value);
      group.scale.setScalar(uiScale);

      if (paused || !comps.length) {
        renderer.render(scene, camera);
        return;
      }

      const speed = parseFloat(speedEl.value);

      // 현재 circles 값 결정
      if (autoRun.enabled && autoRun.isRunning) {
        nCircles = parseInt(circlesEl.value, 10);
      } else {
        nCircles = parseInt(circlesEl.value, 10);
      }

      // 진행
      prevT = t;
      t = (t + dt * 0.12 * speed) % 1.0;

      const { tip, joints } = epicycleTip(t);
      updateArmsAndCircles(joints);
      pushTrailPoint(tip);

      // ---- (요구사항 3) 한 바퀴(드로잉 1회) 완료 감지 ----
      // t가 0으로 래핑되면 "한 번의 드로잉 끝"
      if (autoRun.enabled && autoRun.isRunning) {
        if (prevT > t) { // wrap
          finalizeCurrentTrailAsGhost(); // 끝난 trail을 옅게 남김(ghost)

          let cur = parseInt(circlesEl.value, 10);
          if (cur < autoRun.max) {
            cur = Math.min(autoRun.max, cur + autoRun.step);
            circlesEl.value = String(cur);
            circlesVal.textContent = circlesEl.value;

            // 다음 드로잉 시작
            t = 0;
          } else {
            // max까지 완료 → 최종도 ghost처럼 옅게 남기고 멈춤(원하면 멈추지 않게 바꿔도 됨)
            autoRun.isRunning = false;
            setStatus('done');
            setSlidersEnabled(true);   // 완료 후 사용자가 만질 수 있게
            paused = true;
            document.getElementById('pause').textContent = 'Resume';
          }
        }
      }

      renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);

    // 시작
    loadDemoSVG();
  </script>
</body>
</html>

    <div class="row">

      <input id="samples" type="range" min="256" max="4096" step="256" value="2048" />
      <span id="samplesVal">2048</span>
    </div>

    <div class="row">
      <label>Circles</label>
      <input id="circles" type="range" min="10" max="800" step="10" value="250" />
      <span id="circlesVal">250</span>
    </div>

    <div class="row">
      <label>Speed</label>
      <input id="speed" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
      <span id="speedVal">1.0</span>
    </div>

    <div class="row">
      <label>Scale</label>
      <input id="scale" type="range" min="0.2" max="3.0" step="0.05" value="1.0" />
      <span id="scaleVal">1.0</span>
    </div>

    <div class="row">
      <button id="restart">Restart</button>
      <button id="pause">Pause</button>
      <button id="clear">Clear Trail</button>
      <button id="autofit">Auto Fit</button>
    </div>

    <div class="row">
      <button id="restart">Restart</button>
      <button id="pause">Pause</button>
      <button id="clear">Clear Trail</button>
    </div>

    <small>
      1) SVG 업로드 → 2) DFT(FFT 개념)로 계수 계산 → 3) 에피사이클로 재현.<br/>
      실행은 로컬 서버로 띄우세요. (아래 설명 참고)
    </small>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';

    // -----------------------
    // Three.js 기본 세팅 (2D 느낌으로 Orthographic)
    // -----------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    let baseSamples = []; // 현재 로드된 SVG에서 샘플링된 점들 [{x,y}, ...] (스케일 적용 전 기준)
    
    let camera = makeOrthoCamera();
    function makeOrthoCamera() {
      const w = window.innerWidth, h = window.innerHeight;
      const aspect = w / h;
      const view = 400; // world units
      const cam = new THREE.OrthographicCamera(
        -view * aspect, view * aspect, view, -view, -2000, 2000
      );
      cam.position.set(0, 0, 10);
      cam.lookAt(0, 0, 0);
      return cam;
    }

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera = makeOrthoCamera();
    });

    // -----------------------
    // UI
    // -----------------------
    const fileEl = document.getElementById('file');
    const samplesEl = document.getElementById('samples');
    const circlesEl = document.getElementById('circles');
    const speedEl = document.getElementById('speed');

    const scaleEl = document.getElementById('scale');
    const scaleVal = document.getElementById('scaleVal');

    scaleEl.addEventListener('input', () => scaleVal.textContent = scaleEl.value);
    
    const samplesVal = document.getElementById('samplesVal');
    const circlesVal = document.getElementById('circlesVal');
    const speedVal = document.getElementById('speedVal');

    samplesEl.addEventListener('input', () => samplesVal.textContent = samplesEl.value);
    circlesEl.addEventListener('input', () => circlesVal.textContent = circlesEl.value);
    speedEl.addEventListener('input', () => speedVal.textContent = speedEl.value);

    document.getElementById('restart').addEventListener('click', () => restart());
    document.getElementById('pause').addEventListener('click', () => togglePause());
    document.getElementById('clear').addEventListener('click', () => clearTrail());
    document.getElementById('demo').addEventListener('click', () => loadDemoSVG());

    document.getElementById('autofit').addEventListener('click', () => autoFit());

    fileEl.addEventListener('change', async (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      const text = await f.text();
      await loadFromSvgText(text);
    });

    // -----------------------
    // 에피사이클 데이터 구조
    // -----------------------
    /**
     * comp: { freq:int, re:number, im:number, amp:number, phase:number }
     */
    let comps = [];
    let nCircles = 250;
    let t = 0;            // [0,1)
    let paused = false;

    // -----------------------
    // 렌더 오브젝트들 (원, 팔, 궤적)
    // -----------------------
    const group = new THREE.Group();
    scene.add(group);

    let armsLine = null;
    let circlesLines = null;
    let trailLine = null;

    let trailPoints = [];            // THREE.Vector3[]
    const TRAIL_MAX = 6000;

    function clearSceneGroup() {
      while (group.children.length) group.remove(group.children[0]);
      armsLine = null;
      circlesLines = null;
      trailLine = null;
    }

    function clearTrail() {
      trailPoints = [];
      if (trailLine) {
        trailLine.geometry.dispose();
        group.remove(trailLine);
        trailLine = null;
      }
    }

    function togglePause() {
      paused = !paused;
      document.getElementById('pause').textContent = paused ? 'Resume' : 'Pause';
    }

    function restart() {
      scaleEl.value = "1.0";
      scaleVal.textContent = "1.0";
      group.scale.setScalar(1.0);
      t = 0;
      clearTrail();
    }

    // -----------------------
    // 수학 유틸 (DFT)
    // -----------------------
    function dftComplex(samples) {
      // samples: Array<{x,y}> as complex z = x + i y
      const N = samples.length;
      const out = new Array(N);

      for (let k = 0; k < N; k++) {
        let re = 0, im = 0;
        for (let n = 0; n < N; n++) {
          const phi = (2 * Math.PI * k * n) / N;
          // z_n * e^{-i phi}
          const x = samples[n].x;
          const y = samples[n].y;
          // (x + i y) * (cos(phi) - i sin(phi))
          re += x * Math.cos(phi) + y * Math.sin(phi);
          im += -x * Math.sin(phi) + y * Math.cos(phi);
        }
        re /= N;
        im /= N;

        const freq = (k <= N / 2) ? k : (k - N); // 음수 주파수로 매핑
        const amp = Math.hypot(re, im);
        const phase = Math.atan2(im, re);

        out[k] = { freq, re, im, amp, phase };
      }

      // amp 큰 순으로 정렬
      out.sort((a, b) => b.amp - a.amp);
      return out;
    }

    function epicycleTip(tNorm) {
      const use = comps.slice(0, nCircles);
      let x = 0, y = 0;
      const joints = [{ x, y }];

      for (const c of use) {
        const angle = 2 * Math.PI * c.freq * tNorm + c.phase;
        x += c.amp * Math.cos(angle);
        y += c.amp * Math.sin(angle);
        joints.push({ x, y });
      }
      return { tip: { x, y }, joints };
    }

    // -----------------------
    // SVG -> 점 샘플링
    // -----------------------
    function samplePointsFromSVG(svgText, targetN) {
      const loader = new SVGLoader();
      const data = loader.parse(svgText);

      // SVGLoader는 path -> shapes 형태로 제공하지만,
      // 여기서는 "윤곽선" 느낌으로 stroke path를 점으로 샘플링하기 위해,
      // 원본 path의 subPath들을 따라가며 getPoint() 샘플을 얻는 방식이 제일 단순함.
      // SVGLoader 내부가 Path 기반이 아니라서, 아래는 "shape의 contour"를 따라 샘플링한다.
      // (복잡한 SVG에서 완벽하지 않을 수 있음. 단순 로고/라인아트면 잘 맞음.)
      const points = [];

      // shapes -> Shape.getPoints() 사용
      for (const p of data.paths) {
        const shapes = SVGLoader.createShapes(p);
        for (const s of shapes) {
          // contour points
          const pts = s.getPoints(200);
          for (const v of pts) points.push({ x: v.x, y: v.y });
        }
      }

      if (points.length < 4) throw new Error("SVG에서 충분한 점을 추출하지 못했습니다.");

      // 점들을 targetN개로 리샘플(균일 인덱스)
      const res = [];
      for (let i = 0; i < targetN; i++) {
        const idx = Math.floor((i / targetN) * points.length);
        res.push(points[idx]);
      }

      // 중앙 정렬 + 스케일 정규화
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const p of res) {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
      }
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const size = Math.max(maxX - minX, maxY - minY) || 1;

      // world space로 적당히 맞추기
      const scale = 300 / size;

      for (const p of res) {
        p.x = (p.x - cx) * scale;
        p.y = (p.y - cy) * scale;
      }

      return res;
    }

    // -----------------------
    // Three.js 라인 생성/업데이트
    // -----------------------
    function makeLine(points3, colorHex = 0xffffff, linewidth = 1) {
      const geom = new THREE.BufferGeometry().setFromPoints(points3);
      const mat = new THREE.LineBasicMaterial({ color: colorHex });
      return new THREE.Line(geom, mat);
    }

    function updateArmsAndCircles(joints) {
      // 팔(관절 polyline)
      const armPts = joints.map(p => new THREE.Vector3(p.x, p.y, 0));
      if (!armsLine) {
        armsLine = makeLine(armPts, 0xdddddd);
        group.add(armsLine);
      } else {
        armsLine.geometry.dispose();
        armsLine.geometry = new THREE.BufferGeometry().setFromPoints(armPts);
      }

      // 원들: 각 joint에서 다음 joint까지 거리 = 반지름
      // 원은 폴리라인(60 세그먼트)로 그려서 가볍게.
      const circlePts = [];
      const SEG = 60;
      for (let i = 0; i < joints.length - 1; i++) {
        const cx = joints[i].x, cy = joints[i].y;
        const nx = joints[i + 1].x, ny = joints[i + 1].y;
        const r = Math.hypot(nx - cx, ny - cy);

        for (let s = 0; s <= SEG; s++) {
          const th = (2 * Math.PI * s) / SEG;
          circlePts.push(new THREE.Vector3(cx + r * Math.cos(th), cy + r * Math.sin(th), 0));
        }
        // break (NaN 대신 라인 분리: 여기선 한 줄로 이어져도 큰 문제 없지만, 보기 좋게 아주 짧게 끊어줌)
        circlePts.push(new THREE.Vector3(NaN, NaN, NaN));
      }

      const filtered = circlePts.filter(v => Number.isFinite(v.x) && Number.isFinite(v.y));
      if (!circlesLines) {
        circlesLines = makeLine(filtered, 0x666666);
        group.add(circlesLines);
      } else {
        circlesLines.geometry.dispose();
        circlesLines.geometry = new THREE.BufferGeometry().setFromPoints(filtered);
      }
    }

    function pushTrailPoint(p) {
      trailPoints.push(new THREE.Vector3(p.x, p.y, 0));
      if (trailPoints.length > TRAIL_MAX) trailPoints.shift();

      if (!trailLine) {
        trailLine = makeLine(trailPoints, 0x4aa3ff);
        group.add(trailLine);
      } else {
        trailLine.geometry.dispose();
        trailLine.geometry = new THREE.BufferGeometry().setFromPoints(trailPoints);
      }
    }

    function computeBBox(points) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of points) {
    if (!Number.isFinite(p.x) || !Number.isFinite(p.y)) continue;
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x);
    maxY = Math.max(maxY, p.y);
  }
  return { minX, minY, maxX, maxY, w: (maxX - minX), h: (maxY - minY) };
}

  function autoFit(padding = 1.15) {
    if (!baseSamples || baseSamples.length < 2) return;
  
    const bbox = computeBBox(baseSamples);
    if (!(bbox.w > 0) || !(bbox.h > 0)) return;
  
    // Orthographic camera가 보여주는 월드 단위 폭/높이
    const viewW = (camera.right - camera.left);
    const viewH = (camera.top - camera.bottom);
  
    // group.scale = s 일 때, bbox도 s배로 커짐 → 화면에 들어오게 s 계산
    const s = Math.min(viewW / (bbox.w * padding), viewH / (bbox.h * padding));
  
    // 슬라이더 + group scale 동기화
    const clamped = Math.max(parseFloat(scaleEl.min), Math.min(parseFloat(scaleEl.max), s));
    scaleEl.value = clamped.toFixed(2);
    scaleVal.textContent = scaleEl.value;
    group.scale.setScalar(parseFloat(scaleEl.value));
  }

    // -----------------------
    // 로딩/계산 파이프라인
    // -----------------------
    async function loadFromSvgText(svgText) {
      
      const N = parseInt(samplesEl.value, 10);
      nCircles = parseInt(circlesEl.value, 10);

      clearSceneGroup();
      clearTrail();

      const samples = samplePointsFromSVG(svgText, N);
      baseSamples = samples;   // <-- 추가
      comps = dftComplex(samples);

      // 시작점부터 한 프레임 그려서 화면에 바로 보이게
      const { tip, joints } = epicycleTip(0);
      updateArmsAndCircles(joints);
      pushTrailPoint(tip);
      
      restart();
      autoFit(); // <-- 로드하면 자동으로 화면에 맞춤      
    }

    async function loadDemoSVG() {
      // 간단 데모 SVG(하트 비슷한 path)
      const demo = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100">
        <path d="M0,-10 C-20,-35 -50,-5 0,40 C50,-5 20,-35 0,-10 Z" fill="none" stroke="black"/>
      </svg>`;
      await loadFromSvgText(demo);
    }

    // -----------------------
    // 애니메이션 루프
    // -----------------------
    let last = performance.now();
    function animate(now) {
      requestAnimationFrame(animate);

      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;

      // UI 반영
      nCircles = parseInt(circlesEl.value, 10);
      const speed = parseFloat(speedEl.value);

      const uiScale = parseFloat(scaleEl.value);
      group.scale.setScalar(uiScale);

      if (!paused && comps.length) {
        // t는 [0,1) 한 바퀴가 그림 한 바퀴
        t = (t + dt * 0.12 * speed) % 1.0;

        const { tip, joints } = epicycleTip(t);
        updateArmsAndCircles(joints);
        pushTrailPoint(tip);
      }

      renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);

    // 처음엔 데모 하나 띄우기
    loadDemoSVG();
  </script>
</body>

</html>
